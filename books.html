<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPL — مكتبة الكتب</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --bg:      #07090f;
    --surface: rgba(255,255,255,0.04);
    --border:  rgba(255,255,255,0.07);
    --accent:  #f59e0b;
    --accent2: #6366f1;
    --text:    #f0f4ff;
    --muted:   #475569;
}

body {
    background:var(--bg);
    color:var(--text);
    font-family:'Cairo','Segoe UI',sans-serif;
    min-height:100vh;
}

/* خلفية */
body::before {
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
        linear-gradient(rgba(245,158,11,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.025) 1px, transparent 1px);
    background-size:56px 56px;
}
.glow-wrap {
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.glow-1 {
    position:absolute; top:-200px; right:-100px;
    width:600px; height:500px; border-radius:50%;
    background:radial-gradient(ellipse, rgba(245,158,11,0.07), transparent 70%);
}
.glow-2 {
    position:absolute; bottom:-200px; left:-100px;
    width:500px; height:400px; border-radius:50%;
    background:radial-gradient(ellipse, rgba(99,102,241,0.06), transparent 70%);
}

.wrap { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:24px 16px 80px; }

/* ══ LOADING ══ */
#loading {
    position:fixed; inset:0; z-index:200;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
}
.spinner {
    width:40px; height:40px;
    border:3px solid rgba(245,158,11,0.15);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ══ HEADER ══ */
.header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:32px; gap:12px; flex-wrap:wrap;
}
.header-right { display:flex; align-items:center; gap:14px; }
.back-btn {
    display:flex; align-items:center; gap:6px;
    color:var(--accent); font-weight:700; font-size:14px;
    background:rgba(245,158,11,0.08);
    border:1px solid rgba(245,158,11,0.2);
    border-radius:12px; padding:8px 14px;
    cursor:pointer; transition:all .2s;
    text-decoration:none;
}
.back-btn:hover { background:rgba(245,158,11,0.15); }

.logo-wrap { display:flex; flex-direction:column; }
.logo-main {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(36px,6vw,52px);
    letter-spacing:.08em;
    background:linear-gradient(135deg,#fff,#fcd34d,#f59e0b);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 20px rgba(245,158,11,0.3));
    line-height:1;
}
.logo-sub {
    font-size:11px; font-weight:700;
    letter-spacing:.2em; color:var(--accent);
    text-transform:uppercase; margin-top:4px;
}

.header-left { display:flex; align-items:center; gap:10px; }
#user-card {
    display:flex; align-items:center; gap:8px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px; padding:7px 12px;
}
#user-avatar { width:28px; height:28px; border-radius:50%; border:2px solid var(--accent); object-fit:cover; }
#user-name { font-size:13px; font-weight:700; color:#cbd5e1; max-width:100px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#btn-logout {
    font-size:12px; font-weight:700; color:#f87171;
    background:rgba(248,113,113,0.08);
    border:1px solid rgba(248,113,113,0.15);
    border-radius:8px; padding:4px 10px;
    cursor:pointer; transition:all .2s;
}
#btn-logout:hover { background:rgba(248,113,113,0.18); }

.btn-add {
    display:flex; align-items:center; gap:8px;
    background:linear-gradient(135deg,#f59e0b,#d97706);
    color:#000; font-family:'Cairo',sans-serif;
    font-weight:900; font-size:14px;
    padding:10px 20px; border-radius:14px; border:none;
    cursor:pointer; transition:all .2s;
    box-shadow:0 4px 20px rgba(245,158,11,0.3);
    white-space:nowrap;
}
.btn-add:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(245,158,11,0.4); }

/* ══ CONTROLS ══ */
.controls {
    display:flex; gap:10px; margin-bottom:24px;
    flex-wrap:wrap; align-items:center;
}
.search-wrap {
    flex:1; min-width:200px; position:relative;
}
.search-input {
    width:100%; padding:12px 16px 12px 42px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px; color:var(--text);
    font-family:'Cairo',sans-serif; font-size:14px;
    outline:none; transition:border-color .2s;
}
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); }

.filter-btn {
    padding:10px 16px; border-radius:12px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--muted); font-family:'Cairo',sans-serif;
    font-size:13px; font-weight:700;
    cursor:pointer; transition:all .2s; white-space:nowrap;
}
.filter-btn.active {
    background:rgba(245,158,11,0.12);
    border-color:rgba(245,158,11,0.3);
    color:var(--accent);
}

.sort-select {
    padding:10px 14px; border-radius:12px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text); font-family:'Cairo',sans-serif;
    font-size:13px; font-weight:700;
    cursor:pointer; outline:none;
    transition:border-color .2s;
}
.sort-select:focus { border-color:var(--accent); }

/* ══ STATS BAR ══ */
.stats-bar {
    display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap;
}
.stat-pill {
    display:flex; align-items:center; gap:8px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px; padding:8px 14px;
    font-size:13px; font-weight:700;
    transition:border-color .2s;
}
.stat-pill:hover { border-color:rgba(245,158,11,0.3); }
.stat-dot { width:8px; height:8px; border-radius:50%; }

/* ══ BOOKS GRID ══ */
#books-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:16px;
}

.book-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px; padding:20px;
    transition:all .25s; position:relative;
    overflow:hidden;
}
.book-card::before {
    content:'';
    position:absolute; top:0; right:0;
    width:4px; height:100%;
    border-radius:0 20px 20px 0;
    background:var(--card-color, var(--accent));
    opacity:.6;
}
.book-card:hover {
    transform:translateY(-4px);
    border-color:rgba(245,158,11,0.25);
    box-shadow:0 12px 32px rgba(0,0,0,0.3);
}

.book-field { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:3px; letter-spacing:.08em; }
.book-title { font-size:17px; font-weight:900; line-height:1.3; margin-bottom:14px; color:var(--text); }
.book-author { font-size:13px; color:#93c5fd; font-weight:600; margin-bottom:6px; }
.book-meta {
    display:flex; gap:8px; flex-wrap:wrap;
    margin-bottom:14px;
}
.book-tag {
    font-size:11px; font-weight:700;
    padding:3px 10px; border-radius:8px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    color:var(--muted);
}
.book-tag.year { color:#fcd34d; border-color:rgba(252,211,77,0.2); background:rgba(252,211,77,0.06); }
.book-tag.field { color:#a5b4fc; border-color:rgba(165,180,252,0.2); background:rgba(165,180,252,0.06); }

/* حالة القراءة */
.status-badge {
    display:inline-flex; align-items:center; gap:5px;
    font-size:12px; font-weight:700;
    padding:5px 12px; border-radius:10px;
    margin-bottom:14px;
}
.status-unread  { background:rgba(100,116,139,0.15); color:#64748b; border:1px solid rgba(100,116,139,0.2); }
.status-reading { background:rgba(99,102,241,0.12);  color:#a5b4fc; border:1px solid rgba(99,102,241,0.25); }
.status-done    { background:rgba(34,197,94,0.1);    color:#4ade80; border:1px solid rgba(34,197,94,0.2); }

/* ملاحظات */
.book-notes {
    font-size:12px; color:var(--muted);
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:10px; padding:10px 12px;
    margin-bottom:14px; line-height:1.7;
    white-space:pre-wrap;
    display:none;
}
.book-notes.show { display:block; }

.book-actions {
    display:flex; gap:8px; align-items:center;
    border-top:1px solid var(--border);
    padding-top:12px; margin-top:4px;
}
.act-btn {
    font-size:12px; font-weight:700;
    padding:6px 12px; border-radius:9px;
    border:none; cursor:pointer;
    font-family:'Cairo',sans-serif;
    transition:all .2s;
}
.act-status {
    background:rgba(255,255,255,0.06);
    color:var(--muted);
    border:1px solid var(--border);
}
.act-status:hover { background:rgba(255,255,255,0.1); color:var(--text); }
.act-notes {
    background:rgba(245,158,11,0.08);
    color:var(--accent);
    border:1px solid rgba(245,158,11,0.15);
}
.act-notes:hover { background:rgba(245,158,11,0.15); }
.act-edit {
    background:rgba(99,102,241,0.08);
    color:#a5b4fc;
    border:1px solid rgba(99,102,241,0.15);
}
.act-edit:hover { background:rgba(99,102,241,0.15); }
.act-del {
    margin-right:auto;
    background:none; border:none;
    color:rgba(248,113,113,0.35);
    font-size:16px; cursor:pointer;
    transition:color .2s; padding:4px;
}
.act-del:hover { color:#f87171; }

/* empty */
.empty {
    grid-column:1/-1;
    text-align:center; padding:60px 20px;
    color:var(--muted);
}
.empty-icon { font-size:52px; margin-bottom:16px; }
.empty p { font-size:15px; font-weight:700; }

/* ══ MODAL ══ */
.modal-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:16px; z-index:150;
}
.modal-box {
    background:linear-gradient(145deg,rgba(20,27,45,0.99),rgba(7,9,15,0.99));
    border:1px solid rgba(245,158,11,0.15);
    border-radius:28px; padding:32px 26px;
    width:100%; max-width:460px;
    box-shadow:0 32px 64px rgba(0,0,0,0.7);
    max-height:90vh; overflow-y:auto;
}
.modal-title {
    font-size:20px; font-weight:900;
    text-align:center; margin-bottom:24px;
    background:linear-gradient(135deg,#fff,#fcd34d);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
}
.f-label { font-size:12px; color:var(--muted); font-weight:700; letter-spacing:.08em; display:block; margin-bottom:6px; }
.f-input {
    width:100%; padding:13px 16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:13px; color:var(--text);
    font-family:'Cairo',sans-serif; font-size:14px;
    outline:none; transition:border-color .2s; margin-bottom:16px;
}
.f-input:focus { border-color:var(--accent); }
.f-input::placeholder { color:#334155; }
textarea.f-input { resize:vertical; min-height:90px; }

/* حالة القراءة في الـ modal */
.status-picker {
    display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;
}
.status-opt {
    flex:1; min-width:80px;
    padding:10px 8px; border-radius:12px;
    border:2px solid rgba(255,255,255,0.06);
    background:rgba(255,255,255,0.03);
    color:var(--muted); font-family:'Cairo',sans-serif;
    font-size:13px; font-weight:700;
    cursor:pointer; text-align:center;
    transition:all .2s;
}
.status-opt.active-unread  { border-color:#64748b; color:#94a3b8; background:rgba(100,116,139,0.1); }
.status-opt.active-reading { border-color:#6366f1; color:#a5b4fc; background:rgba(99,102,241,0.1); }
.status-opt.active-done    { border-color:#22c55e; color:#4ade80; background:rgba(34,197,94,0.08); }

.modal-btns { display:flex; gap:10px; margin-top:8px; }
.btn-save {
    flex:1; background:linear-gradient(135deg,#f59e0b,#d97706);
    color:#000; font-family:'Cairo',sans-serif;
    font-weight:900; font-size:15px;
    padding:14px; border-radius:14px; border:none;
    cursor:pointer; transition:all .2s;
}
.btn-save:hover { transform:translateY(-1px); }
.btn-cancel {
    flex:1; background:rgba(255,255,255,0.05);
    color:var(--muted); font-family:'Cairo',sans-serif;
    font-weight:700; font-size:15px;
    padding:14px; border-radius:14px;
    border:1px solid var(--border); cursor:pointer;
    transition:all .2s;
}
.btn-cancel:hover { background:rgba(255,255,255,0.09); }

/* ══ SYNC ══ */
#sync {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:rgba(7,9,15,0.97); border:1px solid var(--border);
    border-radius:12px; padding:10px 22px;
    font-size:13px; font-weight:600;
    backdrop-filter:blur(16px); z-index:100;
    opacity:0; transition:opacity .3s;
    pointer-events:none; white-space:nowrap;
    font-family:'Cairo',sans-serif;
}
#sync.show { opacity:1; }
#sync.ok  { color:#4ade80; border-color:rgba(74,222,128,0.25); }
#sync.err { color:#f87171; border-color:rgba(248,113,113,0.25); }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#1e293b; border-radius:10px; }
</style>
</head>
<body>

<div class="glow-wrap"><div class="glow-1"></div><div class="glow-2"></div></div>

<!-- Loading -->
<div id="loading">
    <div class="spinner"></div>
    <p style="color:#475569;font-size:13px;font-family:'Cairo',sans-serif;">جاري التحقق…</p>
</div>

<!-- Sync -->
<div id="sync"></div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="wrap">

    <!-- Header -->
    <div class="header">
        <div class="header-right">
            <a href="index.html" class="back-btn">← المكتبة</a>
            <div class="logo-wrap">
                <div class="logo-main">BOOKS</div>
                <div class="logo-sub">My Personal Library</div>
            </div>
        </div>
        <div class="header-left">
            <div id="user-card">
                <img id="user-avatar" src="" alt="" style="display:none;">
                <span id="user-name"></span>
                <button id="btn-logout">خروج</button>
            </div>
            <button class="btn-add" id="btn-add">+ إضافة كتاب</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Controls -->
    <div class="controls">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search"
                placeholder="ابحث في الكتب..." oninput="applyFilters()">
        </div>
        <button class="filter-btn active" data-status="all" onclick="setFilter('all',this)">الكل</button>
        <button class="filter-btn" data-status="unread"  onclick="setFilter('unread',this)">📖 لم يُقرأ</button>
        <button class="filter-btn" data-status="reading" onclick="setFilter('reading',this)">🔄 جاري</button>
        <button class="filter-btn" data-status="done"    onclick="setFilter('done',this)">✅ منتهي</button>
        <select class="sort-select" id="sort-select" onchange="applyFilters()">
            <option value="az">أبجدي أ←ي</option>
            <option value="za">أبجدي ي←أ</option>
            <option value="year-asc">السنة ↑</option>
            <option value="year-desc">السنة ↓</option>
            <option value="newest">الأحدث إضافةً</option>
        </select>
    </div>

    <!-- Grid -->
    <div id="books-grid"></div>

</div>
</div>

<!-- Modal -->
<div id="modal" style="display:none;" class="modal-overlay">
<div class="modal-box">
    <h2 class="modal-title" id="modal-title">📚 إضافة كتاب</h2>

    <label class="f-label">عنوان الكتاب *</label>
    <input id="f-title" type="text" class="f-input" placeholder="اسم الكتاب...">

    <label class="f-label">المؤلف</label>
    <input id="f-author" type="text" class="f-input" placeholder="اسم المؤلف...">

    <label class="f-label">المجال / العلم</label>
    <input id="f-field" type="text" class="f-input" placeholder="مثلاً: اقتصاد، فيزياء، تاريخ...">

    <label class="f-label">سنة النشر</label>
    <input id="f-year" type="number" class="f-input" placeholder="مثلاً: 2020" min="1000" max="2099">

    <label class="f-label">حالة القراءة</label>
    <div class="status-picker">
        <div class="status-opt active-unread" data-val="unread"  onclick="pickStatus('unread')">📖 لم يُقرأ</div>
        <div class="status-opt" data-val="reading" onclick="pickStatus('reading')">🔄 جاري</div>
        <div class="status-opt" data-val="done"    onclick="pickStatus('done')">✅ منتهي</div>
    </div>

    <label class="f-label">ملاحظات (اختياري)</label>
    <textarea id="f-notes" class="f-input" placeholder="أي ملاحظات أو اقتباسات..."></textarea>

    <div class="modal-btns">
        <button class="btn-save" onclick="saveBook()">حفظ ✓</button>
        <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
</div>
</div>

<script type="module">
import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, getDocs,
         deleteDoc, updateDoc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey:            "AIzaSyAiPjdGhb0Atjv3i6yIfDI6APBiV70AffU",
    authDomain:        "my-personal-library-25c7e.firebaseapp.com",
    projectId:         "my-personal-library-25c7e",
    storageBucket:     "my-personal-library-25c7e.firebasestorage.app",
    messagingSenderId: "298605799268",
    appId:             "1:298605799268:web:5e20d96dd114e8206bfc71",
    measurementId:     "G-C1JER6D38E"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ══ State ══ */
let currentUser  = null;
let myBooks      = [];
let currentFilter = 'all';
let editingId     = null;
let selectedStatus = 'unread';

/* ══ DOM ══ */
const loadingEl = document.getElementById('loading');
const appEl     = document.getElementById('app');
const syncEl    = document.getElementById('sync');

function showSync(msg, type='') {
    syncEl.textContent = msg;
    syncEl.className   = `show ${type}`;
    clearTimeout(syncEl._t);
    syncEl._t = setTimeout(() => syncEl.className='', 2800);
}

function booksCol() {
    return collection(db, 'users', currentUser.uid, 'books');
}

/* ══ Auth ══ */
const authTimeout = setTimeout(() => {
    if (loadingEl.style.display !== 'none')
        window.location.replace('login.html');
}, 8000);

onAuthStateChanged(auth, async user => {
    clearTimeout(authTimeout);
    if (!user) { window.location.replace('login.html'); return; }
    currentUser = user;
    document.getElementById('user-name').textContent = user.displayName || 'مستخدم';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display='block'; }
    try { await loadBooks(); } catch(e) { console.error(e); renderBooks(); }
    loadingEl.style.opacity = '0';
    setTimeout(() => { loadingEl.style.display='none'; appEl.style.display='block'; }, 500);
});

/* ══ Load ══ */
async function loadBooks() {
    const q    = query(booksCol(), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    myBooks    = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderStats();
    renderBooks();
}

/* ══ Stats ══ */
function renderStats() {
    const total   = myBooks.length;
    const unread  = myBooks.filter(b=>b.status==='unread').length;
    const reading = myBooks.filter(b=>b.status==='reading').length;
    const done    = myBooks.filter(b=>b.status==='done').length;
    document.getElementById('stats-bar').innerHTML = `
        <div class="stat-pill"><span class="stat-dot" style="background:#6366f1;"></span>${total} كتاب</div>
        <div class="stat-pill"><span class="stat-dot" style="background:#64748b;"></span>${unread} لم يُقرأ</div>
        <div class="stat-pill"><span class="stat-dot" style="background:#a5b4fc;"></span>${reading} جاري</div>
        <div class="stat-pill"><span class="stat-dot" style="background:#4ade80;"></span>${done} منتهي</div>
    `;
}

/* ══ Render ══ */
function renderBooks() {
    const q     = document.getElementById('search').value.toLowerCase();
    const sort  = document.getElementById('sort-select').value;

    let list = [...myBooks];

    /* فلتر الحالة */
    if (currentFilter !== 'all') list = list.filter(b => b.status === currentFilter);

    /* بحث */
    if (q) list = list.filter(b =>
        (b.title||'').toLowerCase().includes(q) ||
        (b.author||'').toLowerCase().includes(q) ||
        (b.field||'').toLowerCase().includes(q)
    );

    /* ترتيب */
    list.sort((a,b) => {
        if (sort === 'az')        return (a.title||'').localeCompare(b.title||'', 'ar');
        if (sort === 'za')        return (b.title||'').localeCompare(a.title||'', 'ar');
        if (sort === 'year-asc')  return (a.year||0) - (b.year||0);
        if (sort === 'year-desc') return (b.year||0) - (a.year||0);
        return (b.createdAt||0) - (a.createdAt||0); /* newest */
    });

    const grid = document.getElementById('books-grid');
    if (!list.length) {
        grid.innerHTML = `
        <div class="empty">
            <div class="empty-icon">📭</div>
            <p>${myBooks.length ? 'لا توجد نتائج' : 'مكتبتك فارغة — أضف أول كتاب'}</p>
        </div>`;
        return;
    }

    const statusLabel = { unread:'📖 لم يُقرأ', reading:'🔄 جاري القراءة', done:'✅ منتهي' };
    const statusClass = { unread:'status-unread', reading:'status-reading', done:'status-done' };
    const cardColor   = { unread:'#64748b', reading:'#6366f1', done:'#22c55e' };

    grid.innerHTML = list.map(b => `
    <div class="book-card" style="--card-color:${cardColor[b.status||'unread']}">
        <div class="status-badge ${statusClass[b.status||'unread']}">${statusLabel[b.status||'unread']}</div>
        <div class="book-title">${b.title}</div>
        ${b.author ? `<div class="book-author">✍️ ${b.author}</div>` : ''}
        <div class="book-meta">
            ${b.field ? `<span class="book-tag field">🏷 ${b.field}</span>` : ''}
            ${b.year  ? `<span class="book-tag year">📅 ${b.year}</span>` : ''}
        </div>
        ${b.notes ? `<div class="book-notes" id="notes-${b.id}">${b.notes}</div>` : ''}
        <div class="book-actions">
            <button class="act-btn act-del" onclick="deleteBook('${b.id}')">🗑</button>
            <button class="act-btn act-status" onclick="cycleStatus('${b.id}')">تغيير الحالة</button>
            ${b.notes ? `<button class="act-btn act-notes" onclick="toggleNotes('${b.id}')">ملاحظات</button>` : ''}
            <button class="act-btn act-edit" onclick="openEdit('${b.id}')">تعديل</button>
        </div>
    </div>`).join('');
}

/* ══ Filter ══ */
window.setFilter = function(status, el) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
};
window.applyFilters = renderBooks;

/* ══ Toggle Notes ══ */
window.toggleNotes = function(id) {
    const el = document.getElementById('notes-' + id);
    if (el) el.classList.toggle('show');
};

/* ══ Cycle Status ══ */
window.cycleStatus = async function(id) {
    const book = myBooks.find(b => b.id === id);
    if (!book) return;
    const next = { unread:'reading', reading:'done', done:'unread' };
    const newStatus = next[book.status||'unread'];
    try {
        await updateDoc(doc(db, 'users', currentUser.uid, 'books', id), { status:newStatus });
        book.status = newStatus;
        renderStats();
        renderBooks();
    } catch(e) { showSync('خطأ في التحديث','err'); }
};

/* ══ Modal ══ */
window.pickStatus = function(val) {
    selectedStatus = val;
    document.querySelectorAll('.status-opt').forEach(o => {
        o.className = 'status-opt';
        if (o.dataset.val === val) o.classList.add('active-' + val);
    });
};

window.openModal = function() {
    editingId = null;
    selectedStatus = 'unread';
    document.getElementById('modal-title').textContent = '📚 إضافة كتاب';
    document.getElementById('f-title').value  = '';
    document.getElementById('f-author').value = '';
    document.getElementById('f-field').value  = '';
    document.getElementById('f-year').value   = '';
    document.getElementById('f-notes').value  = '';
    pickStatus('unread');
    document.getElementById('modal').style.display = 'flex';
};

window.openEdit = function(id) {
    const b = myBooks.find(x => x.id === id);
    if (!b) return;
    editingId = id;
    document.getElementById('modal-title').textContent = '✏️ تعديل الكتاب';
    document.getElementById('f-title').value  = b.title  || '';
    document.getElementById('f-author').value = b.author || '';
    document.getElementById('f-field').value  = b.field  || '';
    document.getElementById('f-year').value   = b.year   || '';
    document.getElementById('f-notes').value  = b.notes  || '';
    pickStatus(b.status || 'unread');
    document.getElementById('modal').style.display = 'flex';
};

window.closeModal = function() {
    document.getElementById('modal').style.display = 'none';
};

window.saveBook = async function() {
    const title  = document.getElementById('f-title').value.trim();
    if (!title) { alert('اكتب عنوان الكتاب'); return; }
    const data = {
        title,
        author: document.getElementById('f-author').value.trim() || '',
        field:  document.getElementById('f-field').value.trim()  || '',
        year:   parseInt(document.getElementById('f-year').value) || null,
        notes:  document.getElementById('f-notes').value.trim()  || '',
        status: selectedStatus,
    };
    showSync('⏳ جاري الحفظ…');
    try {
        if (editingId) {
            await updateDoc(doc(db, 'users', currentUser.uid, 'books', editingId), data);
            const idx = myBooks.findIndex(b => b.id === editingId);
            if (idx !== -1) myBooks[idx] = { ...myBooks[idx], ...data };
            showSync('✓ تم التعديل', 'ok');
        } else {
            data.createdAt = Date.now();
            const ref = await addDoc(booksCol(), data);
            myBooks.unshift({ id:ref.id, ...data });
            showSync('✓ تم الحفظ', 'ok');
        }
        renderStats();
        renderBooks();
        closeModal();
    } catch(e) {
        console.error(e);
        showSync('خطأ في الحفظ', 'err');
    }
};

window.deleteBook = async function(id) {
    if (!confirm('هل تريد حذف هذا الكتاب؟')) return;
    showSync('⏳ جاري الحذف…');
    try {
        await deleteDoc(doc(db, 'users', currentUser.uid, 'books', id));
        myBooks = myBooks.filter(b => b.id !== id);
        showSync('✓ تم الحذف', 'ok');
        renderStats();
        renderBooks();
    } catch(e) { showSync('خطأ في الحذف','err'); }
};

/* ══ Logout ══ */
document.getElementById('btn-logout').addEventListener('click', async () => {
    await signOut(auth);
    window.location.replace('login.html');
});

/* ══ Bindings ══ */
document.getElementById('btn-add').addEventListener('click', openModal);
document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
});
</script>
</body>
</html>
